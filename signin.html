<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign In — matcha-haha</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="index.html" class="logo">matcha-haha</a>
    <nav class="primary-nav" aria-label="Primary">
      <ul>
        <li><a href="shop.html">Matcha</a></li>
        <li><a href="shop.html#ready">Ready to Drink</a></li>
        <li><a href="subscriptions.html">Subscription</a></li>
        <li><a href="shop.html#merch">Merchandise</a></li>
        <li><a href="shop.html">Shop all</a></li>
      </ul>
    </nav>
    <div class="header-utils">
      <a id="auth-link" href="signin.html" class="util-link">Sign In</a>
      <span class="util-divider">EN</span>
      <a href="#" class="util-link cart">Cart (0)</a>
    </div>
  </div>
</header>

<main class="auth-page">
  <div class="auth-card">
    <p class="eyebrow">Welcome back</p>
    <h1>Sign in</h1>

    <div class="oauth-row">
      <button class="oauth-btn" data-provider="google">
        <span class="oauth-icon">G</span> Continue with Google
      </button>
      <button class="oauth-btn" data-provider="apple">
        <span class="oauth-icon"></span> Continue with Apple
      </button>
    </div>

    <div class="auth-divider"><span>or</span></div>

    <form id="signin-form" class="auth-form">
      <label>
        <span>Email</span>
        <input type="email" name="email" required autocomplete="email" />
      </label>
      <label>
        <span>Password</span>
        <input type="password" name="password" required autocomplete="current-password" minlength="8" />
      </label>
      <p id="signin-error" class="auth-error" hidden></p>
      <button type="submit" class="btn btn-primary">Sign in</button>
      <p class="auth-helper">
        <a href="#" id="magic-link">Email me a magic link instead</a>
      </p>
    </form>

    <p class="auth-foot">
      New here? <a href="signup.html">Create an account →</a>
    </p>
  </div>
</main>

<script type="module">
  import { signInWithEmail, signInWithMagicLink, signInWithOAuth } from './js/auth.js';

  const params = new URLSearchParams(location.search);
  const next = params.get('next') || 'account.html';

  document.querySelectorAll('.oauth-btn').forEach(b => {
    b.addEventListener('click', () => signInWithOAuth(b.dataset.provider));
  });

  document.getElementById('signin-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.currentTarget);
    const err = document.getElementById('signin-error');
    err.hidden = true;
    const { error } = await signInWithEmail({
      email: fd.get('email'),
      password: fd.get('password'),
    });
    if (error) { err.textContent = error.message; err.hidden = false; return; }
    location.href = next;
  });

  document.getElementById('magic-link').addEventListener('click', async (e) => {
    e.preventDefault();
    const email = document.querySelector('input[name=email]').value;
    if (!email) { alert('Enter your email first.'); return; }
    const { error } = await signInWithMagicLink({ email });
    alert(error ? error.message : 'Check your inbox for a sign-in link.');
  });
</script>
<script type="module" src="js/header.js"></script>
</body>
</html>
